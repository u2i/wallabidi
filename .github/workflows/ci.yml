name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit_tests:
    name: Unit Tests (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.4.1, elixir: 1.20.0, version_type: strict}
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - uses: actions/cache@v5
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ matrix.elixir-otp.otp }}-${{ hashFiles('mix.lock') }}

    - uses: actions/cache@v5
      with:
        path: .browsers
        key: ${{ runner.os }}-browsers-${{ hashFiles('lib/wallabidi/browser_paths.ex') }}

    - run: mix deps.get
    # SandboxIntegrationTest hits the default :chrome_cdp driver, which
    # spawns Chrome locally — install a known-good Chrome for Testing
    # binary so the unit suite isn't at the mercy of whichever
    # ubuntu-latest chromium happens to ship.
    - run: mix wallabidi.install
    - run: mix test

  integration_tests:
    # One job per driver. Each row picks the driver-specific test alias
    # and the max-cases that's been benchmarked as the best
    # passing/perf tradeoff (see README "Concurrency and performance").
    name: ${{ matrix.driver.label }} (${{ matrix.elixir-otp.elixir }}/${{ matrix.elixir-otp.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.4.1, elixir: 1.20.0, version_type: strict}
        driver:
          - label: LiveView Driver
            task: test.live_view
            max_cases: 8
            needs_node: false
            needs_browser_install: false
          - label: Lightpanda
            task: test.lightpanda
            max_cases: 8
            needs_node: false
            needs_browser_install: false
          - label: Chrome CDP
            task: test.chrome
            max_cases: 2
            needs_node: true
            needs_browser_install: true
          - label: Chrome BiDi
            task: test.chrome.bidi
            max_cases: 1
            needs_node: true
            needs_browser_install: true

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - if: matrix.driver.needs_node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - uses: actions/cache@v5
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ matrix.elixir-otp.otp }}-${{ hashFiles('mix.lock') }}

    - if: matrix.driver.needs_browser_install
      uses: actions/cache@v5
      with:
        path: .browsers
        key: ${{ runner.os }}-browsers-${{ hashFiles('lib/wallabidi/browser_paths.ex') }}

    - if: matrix.driver.task == 'test.chrome.bidi'
      uses: actions/cache@v5
      with:
        path: priv/bidi-server/node_modules
        key: ${{ runner.os }}-bidi-server-${{ hashFiles('priv/bidi-server/package.json') }}

    - run: mix deps.get

    - if: matrix.driver.needs_browser_install
      # mix wallabidi.install also runs `npm install` in priv/bidi-server/
      # for the BiDi driver — both Chrome jobs benefit from the cached
      # browser binary and Node modules.
      run: mix wallabidi.install

    - run: mix ${{ matrix.driver.task }} --max-cases ${{ matrix.driver.max_cases }}

  linting:
    name: Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: 28.x
        elixir-version: 1.19.x

    - uses: actions/cache@v5
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

    - uses: actions/cache@v5
      with:
        path: _build
        key: ${{ runner.os }}-dialyzer-28-1.19-${{ hashFiles('mix.lock') }}

    - run: mix deps.get
    - run: mix compile --force --warnings-as-errors
    - run: mix format --check-formatted
    - run: mix credo --strict
    - run: mix dialyzer --halt-exit-status
