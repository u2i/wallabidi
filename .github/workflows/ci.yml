name: CI
on: [push, pull_request]

jobs:
  unit_tests:
    name: Unit Tests (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.elixir-otp.experimental || false }}

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    strategy:
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.x, elixir: 1.20.0-rc.4, version_type: strict, experimental: true}
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - uses: actions/cache@v5
      id: cache
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - name: Install Dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Run Unit Tests
      run: mix test

  live_view_tests:
    name: LiveView Driver (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.elixir-otp.experimental || false }}

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    strategy:
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.x, elixir: 1.20.0-rc.4, version_type: strict, experimental: true}
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - uses: actions/cache@v5
      id: cache
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - name: Install Dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Run LiveView Tests
      run: mix test.live_view

  lightpanda_tests:
    name: Lightpanda CDP (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.elixir-otp.experimental || false }}

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    strategy:
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.x, elixir: 1.20.0-rc.4, version_type: strict, experimental: true}
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - uses: actions/cache@v5
      id: cache
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - name: Install Dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Install Lightpanda
      run: MIX_ENV=test mix lightpanda.install

    - name: Run Lightpanda Tests
      run: mix test.lightpanda

  chrome_tests:
    name: Chrome BiDi (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.elixir-otp.experimental || false }}

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    strategy:
      matrix:
        elixir-otp:
          - {otp: 27.x, elixir: 1.18.x}
          - {otp: 28.x, elixir: 1.19.x}
          - {otp: 28.x, elixir: 1.20.0-rc.4, version_type: strict, experimental: true}
      fail-fast: false

    env:
      WALLABIDI_DRIVER: chrome

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}
        version-type: ${{matrix.elixir-otp.version_type || 'loose'}}

    - uses: actions/cache@v5
      id: cache
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - name: Install Dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Run Chrome Tests
      run: mix test

    - name: Run Lifecycle Tests
      run: mix test.chrome.lifecycle

  linting:
    name: Linting (${{matrix.elixir-otp.elixir}}/${{matrix.elixir-otp.otp}})
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    strategy:
      matrix:
        elixir-otp: [{otp: 28.x, elixir: 1.19.x}]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.elixir-otp.otp}}
        elixir-version: ${{matrix.elixir-otp.elixir}}

    - uses: actions/cache@v5
      id: deps-cache
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - uses: actions/cache@v5
      with:
        path: _build
        key: ${{ runner.os }}-v2-dialyzer-${{matrix.elixir-otp.otp}}-${{ matrix.elixir-otp.elixir }}-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

    - name: Install Dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Compile deps
      run: mix deps.compile
    - name: Compile
      run: mix compile --force --warnings-as-errors --no-deps-check

    - name: Check formatting
      run: mix format --check-formatted

    - name: Run Credo
      run: mix credo --strict

    - name: Run Dialyzer
      run: mix dialyzer
