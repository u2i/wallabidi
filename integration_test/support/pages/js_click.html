<!DOCTYPE html>
<html>
<head><title>JS Click Test</title></head>
<body>
  <div id="container">
    <button id="hide-and-set" onclick="
      document.getElementById('container').style.display = 'none';
      document.getElementById('result').textContent = 'clicked';
    ">Hide and Set</button>
  </div>
  <div id="result"></div>
</body>
</html>
